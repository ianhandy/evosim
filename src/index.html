<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>evosim</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <h1>EVOSIM</h1>
  <p id="loader-msg">Initializing...</p>
  <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
</div>

<!-- SETUP SCREEN -->
<div id="setup" class="hidden">
  <h1>EVOSIM</h1>
  <p class="subtitle">An evolution observation simulation</p>
  <div class="setup-form">
    <div class="setup-row">
      <label>Seed</label>
      <input type="text" id="seed-input" maxlength="6" spellcheck="false" autocomplete="off">
      <button class="btn" onclick="randomSeed()">Random</button>
    </div>
    <div class="setup-row">
      <label>Grid</label>
      <div class="size-options" id="size-options">
        <button class="size-btn active" data-size="32">32×32</button>
        <button class="size-btn" data-size="64">64×64</button>
        <button class="size-btn" data-size="128">128×128</button>
      </div>
    </div>
    <div class="setup-row challenge-row">
      <label>Mode</label>
      <div class="challenge-options" id="challenge-options">
        <button class="challenge-btn active" data-challenge="-1">Free Observation</button>
        <button class="challenge-btn" data-challenge="0">The Conservationist <span class="challenge-hint">All 5 alive at gen 3,000</span></button>
        <button class="challenge-btn" data-challenge="1">The Diverger <span class="challenge-hint">Speciation within 1,000 gens</span></button>
        <button class="challenge-btn" data-challenge="2">Perfect Ecosystem <span class="challenge-hint">All 5 survive to gen 5,000</span></button>
        <button class="challenge-btn" data-challenge="3">Resilience <span class="challenge-hint">Species recovers from &lt;50 to &gt;500</span></button>
        <button class="challenge-btn" data-challenge="4">Speed Observer <span class="challenge-hint">Reach gen 10,000</span></button>
      </div>
    </div>
  </div>
  <canvas id="preview-canvas"></canvas>
  <button class="btn-primary" id="btn-begin">Begin Observation</button>
  <button class="btn" id="btn-load-save" style="display:none;margin-top:8px;">Resume Saved Observation</button>
  <button class="btn" id="btn-history" style="display:none;margin-top:8px;">View History</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header id="header">
    <h1>EVOSIM</h1>
    <div class="controls" id="controls">
      <button class="btn" id="btn-play">▶ Play</button>
      <button class="btn speed-btn active" data-speed="1">1×</button>
      <button class="btn speed-btn" data-speed="5">5×</button>
      <button class="btn speed-btn" data-speed="20">20×</button>
      <button class="btn speed-btn" data-speed="100">100×</button>
    </div>
    <span id="gen-counter">Gen <span id="gen-num">0</span></span>
    <span id="season-label"></span>
    <span id="challenge-badge" class="hidden"></span>
    <div class="header-right">
      <button class="btn btn-small" id="btn-end" title="End observation">End</button>
      <button class="btn btn-small" id="btn-save" title="Save observation">Save</button>
      <button class="btn btn-small" id="btn-lod" title="Simulation detail level">Full</button>
      <select id="theme-select" class="theme-select"></select>
    </div>
  </header>

  <main id="main">
    <section id="map-area">
      <div id="epoch-banner" class="hidden">
        <div id="epoch-name"></div>
      </div>
      <canvas id="map-canvas"></canvas>
      <div class="map-hint" id="map-hint">Drag to pan · Scroll to zoom · Right-drag to tilt · Double-click to reset</div>
    </section>
    <aside id="panel">
      <div id="lab-tabs">
        <button class="lab-tab active" data-tab="overview">Overview</button>
        <button class="lab-tab" data-tab="selection">Selection</button>
        <button class="lab-tab" data-tab="life-history">Life History</button>
        <button class="lab-tab" data-tab="stats">Stats</button>
      </div>

      <div id="tab-overview" class="tab-content active">
        <div class="panel-header">
          <span class="panel-title">Species</span>
          <button class="help-btn" data-help="species">?</button>
        </div>
        <div id="species-cards"></div>

        <div class="panel-header">
          <span class="panel-title">Ecosystem Balance</span>
          <button class="help-btn" data-help="pentagon">?</button>
        </div>
        <canvas id="pentagon-chart"></canvas>

        <div class="panel-header">
          <span class="panel-title">Population</span>
          <button class="help-btn" data-help="population">?</button>
        </div>
        <canvas id="pop-chart"></canvas>

        <div class="panel-header">
          <span class="panel-title">Field Journal</span>
          <button class="help-btn" data-help="journal">?</button>
        </div>
        <div id="journal-feed"></div>

        <div id="graveyard" class="hidden">
          <div class="panel-header">
            <span class="panel-title">Fallen Species</span>
          </div>
          <div id="graveyard-entries"></div>
        </div>
      </div>

      <div id="tab-selection" class="tab-content">
        <canvas id="selection-chart-0" class="trait-chart"></canvas>
        <canvas id="selection-chart-1" class="trait-chart"></canvas>
        <canvas id="selection-chart-2" class="trait-chart"></canvas>
        <canvas id="selection-chart-3" class="trait-chart"></canvas>
        <canvas id="selection-chart-4" class="trait-chart"></canvas>
      </div>

      <div id="tab-life-history" class="tab-content">
        <canvas id="life-history-chart"></canvas>
      </div>

      <div id="tab-stats" class="tab-content">
        <div id="stats-readouts"></div>
      </div>
    </aside>
  </main>
</div>

<!-- END OBSERVATION OVERLAY -->
<div id="end-overlay" class="hidden">
  <div id="end-card">
    <div id="end-title">Observation Complete</div>
    <div id="end-seed"></div>
    <div id="end-stats"></div>
    <div id="end-species-list"></div>
    <div id="end-challenge-result" class="hidden"></div>
    <div id="end-actions">
      <button class="btn" id="end-new">New Observation</button>
      <button class="btn" id="end-close">Continue Watching</button>
    </div>
  </div>
</div>

<!-- EULOGY OVERLAY -->
<div id="eulogy-overlay" class="hidden">
  <div id="eulogy-card">
    <div id="eulogy-icon"></div>
    <div id="eulogy-species"></div>
    <div id="eulogy-dates"></div>
    <div id="eulogy-cause"></div>
    <div id="eulogy-stats"></div>
    <canvas id="eulogy-sparkline" width="200" height="40"></canvas>
    <button class="btn" id="eulogy-dismiss">Continue Observation</button>
  </div>
</div>

<!-- ACHIEVEMENT TOAST -->
<div id="achievement-toast" class="hidden">
  <div id="achievement-toast-text"></div>
</div>

<!-- HALL OF OBSERVATIONS OVERLAY -->
<div id="hall-overlay" class="hidden">
  <div id="hall-card">
    <div id="hall-title">Hall of Observations</div>
    <div id="hall-list"></div>
    <button class="btn" id="hall-close">Close</button>
  </div>
</div>

<!-- TOOLTIP OVERLAY -->
<div id="tooltip-overlay" class="hidden">
  <div id="tooltip-card">
    <div id="tooltip-title"></div>
    <div id="tooltip-body"></div>
    <button class="btn btn-small" id="tooltip-close">Got it</button>
  </div>
</div>

<script type="module" src="ui.js"></script>
</body>
</html>
